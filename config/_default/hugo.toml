baseURL = 'http://localhost/'
title = "AWSD"
defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = false

# Le thème est importé via [module] plutôt que `theme = "TailBliss"` afin de
# NE PAS monter son dossier content/ (pages de démo blog-post-*, about, prose…).
# On monte explicitement tout le reste du thème, sauf content.
[module]
  [[module.imports]]
    path = "TailBliss"
    [[module.imports.mounts]]
      source = "layouts"
      target = "layouts"
    [[module.imports.mounts]]
      source = "assets"
      target = "assets"
    [[module.imports.mounts]]
      source = "static"
      target = "static"
    [[module.imports.mounts]]
      source = "archetypes"
      target = "archetypes"

enableEmoji = true
enableGitInfo = false
enableRobotsTXT = true
canonifyURLs = false
enableInlineShortcodes = false

[pagination]
  pagerSize = 9

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[languages]
  [languages.fr]
    locale = "fr-FR"
    label = "Français"
    weight = 1
    title = "AWSD"

  [languages.en]
    locale = "en-US"
    label = "English"
    weight = 2
    title = "AWSD"
