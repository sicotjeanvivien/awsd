<div class="relative my-4">
  <div class="lg:mx-auto lg:grid lg:max-w-7xl lg:grid-cols-2 lg:items-start lg:gap-24 lg:px-8">
    <div class="relative sm:py-8 lg:py-0">
      <div aria-hidden="true" class="hidden sm:block lg:absolute lg:inset-y-0 lg:right-0 lg:w-screen">
        <div class="absolute inset-y-0 right-1/2 w-full bg-gray-50 rounded-r-3xl dark:bg-gray-900/10 lg:right-72"></div>
        <svg class="absolute top-8 left-1/2 -ml-3 lg:-right-8 lg:left-auto lg:top-12" width="404" height="392"
          fill="none" viewBox="0 0 404 392" loading="lazy">
          <defs>
            <pattern id="02f20b47-fd69-4224-a62a-4c9de5c763f7" x="0" y="0" width="20" height="20"
              patternUnits="userSpaceOnUse">
              <rect x="0" y="0" width="4" height="4" class="text-gray-200 dark:text-gray-900/60" fill="currentcolor">
              </rect>
            </pattern>
          </defs>
          <rect width="404" height="392" fill="url(#02f20b47-fd69-4224-a62a-4c9de5c763f7)"></rect>
        </svg>
      </div>
      <div class="relative px-4 py-6 mx-auto w-full h-auto sm:max-w-3xl sm:px-6 lg:px-0 lg:py-20">
        <div class="overflow-hidden rounded-2xl shadow-xl">
          {{ $p1image := resources.Get .Site.Params.P1.Image }}
          {{ with $p1image }}
          {{ with .Resize "600x600 webp q85" }}
          <img src="{{ .RelPermalink }}" width="{{ .Width }}" height="{{ .Height }}" class="w-full h-auto" alt="P1"
            loading="lazy" />
          {{ end }}
          {{ end }}
        </div>
      </div>
    </div>
    <div class="relative px-4 mx-auto max-w-md sm:max-w-3xl sm:px-6 lg:px-0">
      <div class="md:pt-12 sm:pt-6 lg:pt-20">
        <h2 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-gray-50 sm:text-4xl">
          {{ .Site.Params.P1.Heading }}
        </h2>
        <div class="mt-6 text-gray-900 dark:text-white">
          <div class="mt-6 space-y-6 text-gray-900 dark:text-white">
            {{ range .Site.Params.P1.Content }}
            <p class="text-lg text-gray-900 dark:text-white">
              {{ .text }}
            </p>
            {{ end }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
