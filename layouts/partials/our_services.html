<div class="overflow-hidden sm:pt-6 lg:relative">
  <div class="px-4 mx-auto max-w-md sm:max-w-3xl sm:px-6 lg:grid lg:max-w-7xl lg:grid-cols-1 lg:gap-12 lg:px-8">
    <div class="md:mt-8">
      <div class="mt-6">
        <h2 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-gray-50 sm:text-4xl">
          {{ .Site.Params.P2.Heading }}
        </h2>
        <p class="pb-12 mt-6 text-lg text-gray-900 dark:text-white">
          {{ .Site.Params.P2.Content.Text }}
        </p>
      </div>
      <div class="pb-12 grid gap-8 md:grid-cols-3">

        <!-- Service 1 -->
        {{ range .Site.Params.P2.services }}
        <div class="p-6 bg-gray-50 dark:bg-gray-800 rounded-xl shadow-sm">
          <h3 class="text-xl font-semibold text-gray-900 dark:text-white mb-3">{{ .icon }}{{ .title }} </h3>
          <p class="text-gray-600 dark:text-gray-300 mb-4">{{ .description}}</p>
          <ul class="text-sm text-gray-600 dark:text-gray-400 space-y-2">
            {{ range .list }}
            <li>• {{ .li }}</li>
            {{ end }}
          </ul>
        </div>
        {{ end }}

      </div>
      <div class="text-center pb-12">
        <a href="/services" class="inline-block px-6 py-3 text-white bg-primary-600 rounded-lg hover:bg-primary-700">
          Voir tous les services
        </a>
      </div>
    </div>
  </div>
